<link rel="preconnect" href="https://fonts.googleapis.com" />

<link rel="stylesheet" href="styles/tokens.css" />

<style>
  /* Responsive */
  @media (max-width: 900px) {
    .public-nav-links, .public-nav-cta { display: none !important; }
    .public-nav-burger { display: inline-flex !important; }
    .hero-grid, .pp-grid, .how-grid, .pricing-grid, .courses-grid, .testimonials-grid,
    .admin-stats, .admin-two-col, .admin-courses-grid, .admin-edit-grid,
    .student-courses-grid, .student-continue, .course-hero-grid, .course-body-grid,
    .catalog-grid, .footer-grid, .ds-cards-grid, .ds-type-grid, .ds-form-grid, .profile-grid-2 {
      grid-template-columns: 1fr !important;
    }
    .lesson-wrap { grid-template-columns: 1fr !important; }
    .lesson-sidebar { display: none; }
    .lesson-show-list { display: inline-flex !important; }
    .lesson-prev { display: none; }
    .admin-sidebar { display: none !important; }
    .container { padding: 0 18px; }
    .student-nav { gap: 14px; overflow-x: auto; }
  }
  @media (max-width: 600px) {
    body { font-size: 15px; }
  }
  /* Link reset for a tags used as buttons */
  a { color: var(--accent); }
  a:hover { color: var(--accent-deep); }
</style>
</head>

<div id="root"></div>
